<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitt Flappy Bird Spel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            overflow: hidden;
            color: white;
        }

        .game-wrapper {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 2.2rem;
            font-weight: 800;
            background: -webkit-linear-gradient(#fff, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

        .instructions {
            font-size: 0.9rem;
            color: #b0c4de;
            margin-bottom: 20px;
        }

        canvas {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            background: linear-gradient(to bottom, #4cb8c4, #3cd3ad);
            cursor: pointer;
        }

        .container {
            margin-top: 25px;
        }

        /* Professional Download Button */
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #f12711, #f5af19);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(245, 175, 25, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(245, 175, 25, 0.6);
            background: linear-gradient(135deg, #f5af19, #f12711);
        }

        .download-btn:active {
            transform: translateY(1px);
        }

        .download-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>Flappy Bird Online</h1>
        <div class="instructions">Tryck på <b>Mellanslag</b> eller <b>Klicka</b> för att hoppa!</div>

        <canvas id="gameCanvas" width="320" height="480"></canvas>

        <div class="container">
            <a href="https://github.com/PellkvistDev/flappybird/releases/download/02496/flappy_bird.exe" class="download-btn" download>
                <svg class="download-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                Ladda ner offlineversionen
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Spelinställningar
        let bird = { x: 50, y: 200, radius: 14, gravity: 0.5, lift: -8, velocity: 0 };
        let pipes = [];
        let frame = 0;
        let score = 0;
        let gameOver = false;

        const pipeWidth = 50;
        const pipeGap = 130;

        function createPipe() {
            const minHeight = 60;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const height = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({ x: canvas.width, top: height, bottom: canvas.height - height - pipeGap });
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            // Fågelns rotation baserat på hastighet
            let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (bird.velocity * 0.1)));
            ctx.rotate(rotation);

            // Kropp
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#FFD700"; // Guldgul
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#B8860B";
            ctx.stroke();

            // Öga
            ctx.beginPath();
            ctx.arc(6, -4, 4, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(7, -4, 2, 0, Math.PI * 2);
            ctx.fillStyle = "black";
            ctx.fill();

            // Näbb
            ctx.beginPath();
            ctx.moveTo(10, 2);
            ctx.lineTo(20, 4);
            ctx.lineTo(10, 8);
            ctx.fillStyle = "#FF8C00";
            ctx.fill();

            // Vinge
            ctx.beginPath();
            ctx.ellipse(-4, 2, 6, 4, Math.PI / 6, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();

            ctx.restore();
        }

        function drawPipes() {
            pipes.forEach(pipe => {
                // Gradient för rören för en 3D-effekt
                let gradient = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                gradient.addColorStop(0, "#2ecc71");
                gradient.addColorStop(0.5, "#58d68d");
                gradient.addColorStop(1, "#27ae60");

                ctx.fillStyle = gradient;
                ctx.strokeStyle = "#1e8449";
                ctx.lineWidth = 2;

                // Övre rör
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.top);
                // Övre rörhatt
                ctx.fillRect(pipe.x - 4, pipe.top - 20, pipeWidth + 8, 20);
                ctx.strokeRect(pipe.x - 4, pipe.top - 20, pipeWidth + 8, 20);

                // Undre rör
                ctx.fillRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
                ctx.strokeRect(pipe.x, canvas.height - pipe.bottom, pipeWidth, pipe.bottom);
                // Undre rörhatt
                ctx.fillRect(pipe.x - 4, canvas.height - pipe.bottom, pipeWidth + 8, 20);
                ctx.strokeRect(pipe.x - 4, canvas.height - pipe.bottom, pipeWidth + 8, 20);
            });
        }

        function draw() {
            // Rensa canvas (bakgrunden sköts via CSS-gradienten)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawPipes();
            drawBird();

            // Poäng
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 3;
            ctx.font = "bold 32px Poppins, Arial";
            ctx.strokeText(score, canvas.width / 2 - 10, 50);
            ctx.fillText(score, canvas.width / 2 - 10, 50);

            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "white";
                ctx.font = "bold 36px Poppins, Arial";
                ctx.fillText("GAME OVER", canvas.width / 2 - 110, canvas.height / 2 - 20);
                
                ctx.font = "18px Poppins, Arial";
                ctx.fillStyle = "#f5af19";
                ctx.fillText("Klicka för att köra igen", canvas.width / 2 - 95, canvas.height / 2 + 20);
            }
        }

        function update() {
            if (gameOver) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (frame % 100 === 0) createPipe();

            pipes.forEach((pipe, index) => {
                pipe.x -= 2.5; // Hastighet på rören

                // Kollision
                let closestX = Math.max(pipe.x, Math.min(bird.x, pipe.x + pipeWidth));
                
                // Övre rör kollision
                let closestYTop = Math.max(0, Math.min(bird.y, pipe.top));
                let distanceXTop = bird.x - closestX;
                let distanceYTop = bird.y - closestYTop;
                
                // Undre rör kollision
                let closestYBot = Math.max(canvas.height - pipe.bottom, Math.min(bird.y, canvas.height));
                let distanceXBot = bird.x - closestX;
                let distanceYBot = bird.y - closestYBot;

                if (
                    (distanceXTop * distanceXTop + distanceYTop * distanceYTop < bird.radius * bird.radius) ||
                    (distanceXBot * distanceXBot + distanceYBot * distanceYBot < bird.radius * bird.radius)
                ) {
                    gameOver = true;
                }

                if (pipe.x === Math.floor(bird.x)) score++;
                
                // Ta bort rör som åkt utanför skärmen
                if (pipe.x + pipeWidth < 0) pipes.splice(index, 1);
            });

            // Kollision med mark eller tak
            if (bird.y + bird.radius >= canvas.height || bird.y - bird.radius <= 0) {
                gameOver = true;
            }

            frame++;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function resetGame() {
            bird.y = 200;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frame = 0;
            gameOver = false;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Förhindra att sidan scrollar
                if (gameOver) resetGame();
                else bird.velocity = bird.lift;
            }
        });

        canvas.addEventListener('mousedown', () => {
            if (gameOver) resetGame();
            else bird.velocity = bird.lift;
        });

        // Starta spelet
        loop();
    </script>
</body>
</html>
